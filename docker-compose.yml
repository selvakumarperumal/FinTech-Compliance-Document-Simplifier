services:
  # Development backend service with hot reload
  fintech-dev:
    build:
      context: ./backend
      target: development
    container_name: fintech-compliance-dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
    networks:
      - fintech-network
    profiles:
      - dev
    restart: unless-stopped

  # Development frontend service with hot reload
  frontend-dev:
    build:
      context: ./frontend
      target: development
    container_name: fintech-frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://fintech-dev:8000
    networks:
      - fintech-network
    profiles:
      - dev
    restart: unless-stopped
    depends_on:
      - fintech-dev

  # Production backend service
  fintech-prod:
    build:
      context: ./backend
      target: production
    container_name: fintech-compliance-prod
    ports:
      - "8080:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
    networks:
      - fintech-network
    profiles:
      - prod
    restart: unless-stopped

  # Production frontend service (Nginx)
  frontend-prod:
    build:
      context: ./frontend
      target: production
    container_name: fintech-frontend-prod
    ports:
      - "80:80"
    networks:
      - fintech-network
    profiles:
      - prod
    restart: unless-stopped
    depends_on:
      - fintech-prod

networks:
  fintech-network:
    driver: bridge
